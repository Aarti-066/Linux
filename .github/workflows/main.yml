name: My First Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 - Get my code
        uses: actions/checkout@v3

      - name: Step 2 - Say Hello
        run: echo "Pipeline is working!"

      - name: Step 3 - Show my files
        run: ls

      - name: Step 4 - Show date and time
        run: date
