name: DevOps-CI-CD-Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 - Get my code
        uses: actions/checkout@v3

      - name: Step 2 - Build Docker image
        run: docker build -t my-website ./myapp-docker

      - name: Step 3 - Check Docker image
        run: docker images

      - name: Step 4 - Pipeline complete
        run: echo "App built successfully!"
